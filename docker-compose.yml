services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mathmentor
      POSTGRES_USER: mathmentor
      POSTGRES_PASSWORD: mathmentor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathmentor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "1"
      SECRET_KEY: "django-insecure-docker-dev-secret-change-in-production"
      # Database — dj_database_url reads DATABASE_URL
      DATABASE_URL: postgres://mathmentor:mathmentor@db:5432/mathmentor
      # Individual DB vars used by entrypoint wait script
      DB_NAME: mathmentor
      DB_USER: mathmentor
      DB_PASSWORD: mathmentor
      DB_HOST: db
      DB_PORT: "5432"
      # Redis
      REDIS_URL: redis://redis:6379
      # CORS / Frontend
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:3000"
      # Email (console backend for local dev — no SMTP needed)
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      EMAIL_FROM_ADDRESS: noreply@mathmentor.com

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Anonymous volume ensures the container's node_modules (built during
      # image build) are used instead of any host-side node_modules directory.
      - /app/node_modules
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: "http://localhost:8000"
      REACT_APP_WS_URL: "ws://localhost:8000"
    command: npm start

volumes:
  postgres_data:
